name: ci

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Dogfood the drift gate on ourselves (refs mode): every reusable workflow
  # this repo references must be classified in our own registry.
  ci-local-coverage:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-ci-local-coverage.yml@12c41714d56ff512e8093cd96a2ab11e60aced17
    with:
      mode: refs
      enforce: true
      ci-local-ref: ${{ github.head_ref || github.ref_name }}

  lint-and-test:
    name: lint + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ !github.event.pull_request.draft }}
    permissions:
      contents: read
    steps:
      - name: Harden the runner (audit egress)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install shellcheck + bats
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck bats

      - name: Lint (shellcheck + py_compile)
        run: make lint

      - name: Test (self-test + bats)
        run: make test
