name: DevOps / Secrets

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    # Last Sunday of the month (fleet cron convention) — keep history scans fresh
    # even when the tree doesn't change.
    - cron: "0 6 25-31 * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    if: ${{ !github.event.pull_request.draft }}
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-gitleaks.yml@12c41714d56ff512e8093cd96a2ab11e60aced17
    with:
      scan-history: true
      upload-sarif: false
