name: Code Quality (SonarCloud)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sonar:
    permissions: { contents: read }
    uses: ffreis-org/ffreis-workflows-general/.github/workflows/general-sonarcloud.yml@12c41714d56ff512e8093cd96a2ab11e60aced17
    with: { working-directory: "." }
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
