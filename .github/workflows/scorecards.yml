name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "0 4 25-31 * 0"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  scorecard:
    permissions: { security-events: write, id-token: write, contents: read, actions: read }
    uses: ffreis-org/ffreis-workflows-general/.github/workflows/general-scorecard.yml@12c41714d56ff512e8093cd96a2ab11e60aced17
    with: { upload-sarif: false }
